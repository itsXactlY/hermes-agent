# tmux configuration for Hermes Terminal
# Amber #f5b731 on Dark #1a1a24
# Add to ~/.tmux.conf:   cat hermes-amber.conf >> ~/.tmux.conf
# Or source:             tmux source-file hermes-amber.conf

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar position and refresh
set -g status-position top
set -g status-interval 1

# Status bar style
set -g status-style "bg=#1a1a24,fg=#f5b731"

# Left status — Session name with amber highlight
set -g status-left-length 30
set -g status-left "#[bg=#f5b731,fg=#1a1a24,bold] ❐ #S #[bg=#1a1a24,fg=#f5b731] "

# Right status — User, hostname, time
set -g status-right-length 50
set -g status-right "#[fg=#666677]#(whoami)@#h #[fg=#f5b731]%H:%M #[bg=#f5b731,fg=#1a1a24,bold] %d-%b-%y "

# Window tabs
setw -g window-status-format "#[fg=#666677] #I:#W "
setw -g window-status-current-format "#[bg=#2a2a34,fg=#f5b731,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#333344"
set -g pane-active-border-style "fg=#f5b731"

# Message styling
set -g message-style "bg=#1a1a24,fg=#f5b731"
set -g message-command-style "bg=#1a1a24,fg=#f5b731"

# Mode styling (copy mode)
setw -g mode-style "bg=#f5b731,fg=#1a1a24"

# Clock mode
set -g clock-mode-colour "#f5b731"
set -g clock-mode-style 24

# Pane number display
set -g display-panes-active-colour "#f5b731"
set -g display-panes-colour "#666677"

# Key bindings display duration
set -g display-time 2000
